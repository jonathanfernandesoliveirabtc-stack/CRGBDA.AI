name: Gerar APK CRGBDA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Pegar arquivos
        uses: actions/checkout@v4

      - name: Preparar ambiente
        run: |
          sudo apt update -y
          sudo apt install -y git zip unzip openjdk-17-jdk python3-pip python3-venv libffi-dev libssl-dev autoconf automake libtool pkg-config

          python3 -m venv venv
          source venv/bin/activate
          pip install --upgrade pip setuptools wheel
          pip install buildozer cython==0.29.36 python-dotenv

      - name: Gerar APK
        run: |
          source venv/bin/activate
          yes | buildozer android debug

      - name: Salvar APK
        uses: actions/upload-artifact@v4
        with:
          name: APK-Pronto
          path: bin/*.apk
